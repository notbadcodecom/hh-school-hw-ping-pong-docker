<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping-Pong Emulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .play-button {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        .play-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .play-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .score-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            font-size: 1.3em;
            color: #333;
        }

        .player {
            text-align: center;
        }

        .player-name {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .player-score {
            font-size: 2em;
            color: #764ba2;
            font-weight: bold;
        }

        .vs {
            color: #999;
            font-size: 1.5em;
        }

        .log-container {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .log-entry {
            padding: 8px;
            margin: 5px 0;
            border-left: 3px solid #667eea;
            padding-left: 12px;
            color: #333;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
        }

        .log-entry.ping {
            border-left-color: #667eea;
            color: #667eea;
        }

        .log-entry.pong {
            border-left-color: #764ba2;
            color: #764ba2;
        }

        .log-entry.winner {
            border-left-color: #28a745;
            color: #28a745;
            font-weight: bold;
            background: #f0f8f4;
        }

        .log-entry.oops {
            border-left-color: #ff6b6b;
            color: #ff6b6b;
            font-weight: bold;
            background: #fff0f0;
        }

        .log-entry.game-header {
            border-left-color: #007bff;
            color: #007bff;
            font-weight: bold;
            background: #f0f8ff;
        }

        .log-entry.match-end {
            border-left-color: #ffc107;
            color: #ff6b00;
            font-weight: bold;
            background: #fffbf0;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .history-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: bold;
        }

        .history-table td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        .history-table tbody tr:hover {
            background: #f9f9f9;
        }

        .winner-badge {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 0.95em;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .winner-announcement {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .no-matches {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .log-container {
                max-height: 250px;
            }

            .history-table {
                font-size: 0.9em;
            }

            .history-table th,
            .history-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏓 Ping-Pong Emulator</h1>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Текущий матч</h2>
                <button class="play-button" id="playBtn">Сыграть матч</button>

                <div id="matchContainer" style="display: none;">
                    <div class="score-display">
                        <div class="player">
                            <div class="player-name" id="player1Name">Ma Long</div>
                            <div class="player-score" id="player1Score">0</div>
                        </div>
                        <div class="vs">:</div>
                        <div class="player">
                            <div class="player-name" id="player2Name">Jan-Ove Waldner</div>
                            <div class="player-score" id="player2Score">0</div>
                        </div>
                    </div>

                    <div class="log-container">
                        <div id="matchLog"></div>
                    </div>

                    <div id="winnerAnnouncement" class="winner-announcement" style="display: none;"></div>
                </div>
            </div>

            <div class="card">
                <h2>История матчей</h2>
                <div id="historyContainer">
                    <table class="history-table" id="historyTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>Игрок 1</th>
                                <th>Игрок 2</th>
                                <th>Счёт</th>
                                <th>Победитель</th>
                                <th>Дата</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                        </tbody>
                    </table>
                    <div class="no-matches" id="noMatches">Матчей ещё не сыграно</div>
                </div>

                <div class="controls" id="controls" style="display: none;">
                    <button class="btn btn-danger" id="clearBtn">Очистить историю</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMatchId = null;
        let pollingInterval = null;

        const playBtn = document.getElementById('playBtn');
        const matchContainer = document.getElementById('matchContainer');
        const matchLog = document.getElementById('matchLog');
        const player1Score = document.getElementById('player1Score');
        const player2Score = document.getElementById('player2Score');
        const historyTable = document.getElementById('historyTable');
        const historyBody = document.getElementById('historyBody');
        const noMatches = document.getElementById('noMatches');
        const clearBtn = document.getElementById('clearBtn');
        const winnerAnnouncement = document.getElementById('winnerAnnouncement');
        const controls = document.getElementById('controls');

        playBtn.addEventListener('click', startMatch);
        clearBtn.addEventListener('click', clearHistory);

        async function startMatch() {
            playBtn.disabled = true;
            playBtn.innerHTML = '<span class="spinner"></span>Матч запущен...';

            try {
                const response = await fetch('/api/start-match/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();
                currentMatchId = data.match_id;

                matchContainer.style.display = 'block';
                matchLog.innerHTML = '';
                player1Score.textContent = '0';
                player2Score.textContent = '0';
                winnerAnnouncement.style.display = 'none';

                pollMatchStatus();
                pollingInterval = setInterval(pollMatchStatus, 500);
            } catch (error) {
                console.error('Error:', error);
                playBtn.disabled = false;
                playBtn.textContent = 'Сыграть матч';
            }
        }

        async function pollMatchStatus() {
            try {
                const response = await fetch(`/api/match-status/${currentMatchId}/`);
                const data = await response.json();

                player1Score.textContent = data.score[0];
                player2Score.textContent = data.score[1];

                updateLog(data.current_log);

                if (data.is_finished) {
                    clearInterval(pollingInterval);
                    playBtn.disabled = false;
                    playBtn.textContent = 'Сыграть матч';

                    if (data.winner) {
                        winnerAnnouncement.textContent = `🎉 Матч завершён! Победитель: ${data.winner}`;
                        winnerAnnouncement.style.display = 'block';
                    }

                    await loadHistory();
                }
            } catch (error) {
                console.error('Polling error:', error);
            }
        }

        function updateLog(logEntries) {
            matchLog.innerHTML = '';
            logEntries.forEach(entry => {
                const logDiv = document.createElement('div');
                logDiv.className = 'log-entry';

                if (entry.startsWith('Партия') && entry.includes(':')) {
                    logDiv.classList.add('winner');
                } else if (entry.includes('ping') && !entry.includes('oops')) {
                    logDiv.classList.add('ping');
                } else if (entry.includes('pong') && !entry.includes('oops')) {
                    logDiv.classList.add('pong');
                } else if (entry.includes('oops')) {
                    logDiv.classList.add('oops');
                } else if (entry.includes('Матч завершён') || entry.includes('Победитель матча')) {
                    logDiv.classList.add('match-end');
                }

                logDiv.textContent = entry;
                matchLog.appendChild(logDiv);
            });

            matchLog.scrollTop = matchLog.scrollHeight;
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/matches/');
                const matches = await response.json();

                historyBody.innerHTML = '';

                if (matches.length > 0) {
                    historyTable.style.display = 'table';
                    noMatches.style.display = 'none';
                    controls.style.display = 'flex';

                    matches.forEach(match => {
                        const row = document.createElement('tr');
                        const date = new Date(match.start_time).toLocaleString('ru-RU');
                        const score = `${match.score1} : ${match.score2}`;

                        row.innerHTML = `
                            <td>${match.player1}</td>
                            <td>${match.player2}</td>
                            <td>${score}</td>
                            <td><span class="winner-badge">${match.winner}</span></td>
                            <td>${date}</td>
                        `;

                        historyBody.appendChild(row);
                    });
                } else {
                    historyTable.style.display = 'none';
                    noMatches.style.display = 'block';
                    controls.style.display = 'none';
                }
            } catch (error) {
                console.error('Error loading history:', error);
            }
        }

        async function clearHistory() {
            if (confirm('Вы уверены? История матчей будет удалена.')) {
                try {
                    await fetch('/api/matches/clear/', {
                        method: 'DELETE'
                    });
                    await loadHistory();
                } catch (error) {
                    console.error('Error clearing history:', error);
                }
            }
        }

        loadHistory();
    </script>
</body>
</html>
